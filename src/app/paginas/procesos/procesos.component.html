<h1>Procesos o políticas de negocio</h1>

<div class="tarjeta">
  <h2>{{ modoEdicion ? 'Editar proceso' : 'Crear proceso' }}</h2>

  <label>Nombre</label>
  <input title="Nombre" [(ngModel)]="procesoFormulario.nombre" placeholder="Ejemplo: Proceso de atención al cliente">

  <label>Descripción</label>
  <textarea title="Descripción" [(ngModel)]="procesoFormulario.descripcion" placeholder="Detalle sobre el proceso"></textarea>

  <label>Departamentos separados por coma</label>
  <input
    title="Departamentos"
    [(ngModel)]="departamentosTexto"
    placeholder="Atención al cliente, Evaluación, Legal, Almacén">

  <div class="acciones">
    <button (click)="guardarProceso()">
      {{ modoEdicion ? 'Actualizar proceso' : 'Crear proceso' }}
    </button>

    <button type="button" (click)="limpiarFormulario()">
      Limpiar
    </button>

    <button type="button" (click)="listarProcesos()">
      Recargar procesos
    </button>
  </div>

  <p class="mensaje">{{ mensaje }}</p>
</div>

<table class="tabla-simple" *ngIf="procesos.length > 0">
  <thead>
    <tr>
      <th>Identificador</th>
      <th>Nombre</th>
      <th>Descripción</th>
      <th>Departamentos</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let proceso of procesos">
      <td>{{ proceso.id }}</td>
      <td>{{ proceso.nombre }}</td>
      <td>{{ proceso.descripcion }}</td>
      <td>{{ proceso.departamentos.join(', ') }}</td>
      <td>
        <button (click)="editarProceso(proceso)">Editar</button>
        <button (click)="eliminarProceso(proceso)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
